scene: >
  The HJ resolution of the cyclic quotient surface singularity (n,q) encoded as an
  FDRS Phase-7 context-dependent radix LAW (Def 89/103): context (n,q); radix
  Ω = ceil(n/q) = a_i = -E_i.E_i; evolution Γ(n,q) = (q, a*q - n); terminal q==0 is
  a Base-0 Wall (Phase 9). A singularity is a radix law (finite word over {2,3,...}),
  not a point on one line (F-lawpoint honored).
oracles:
  - O1 round-trip (full battery): minus-CF continuant EVALUATION of the chain == n/q
    (independent direction from extraction).
  - O2 gauge (full battery): |det(intersection form)| == n AND |det(minor)| == q,
    via Sage exact ZZ determinant (a different code path from the recursion). O2's
    |det|==n IS the promoted headline: gauge = continuant = n = |cyclic group|.
  - O3 toric (sample n<=60): resolution rays from the cone's Hilbert basis + the wall
    relation u_{i-1}+u_{i+1}=a_i u_i (convention Cone([(1,0),(-q,n)]), calibrated on
    (7,3)->[3,2,2]; convention (0,1),(n,-q) correctly returns the Riemenschneider dual).
verdict: >
  ALL PASS. O1+O2: 12231 pairs (0<q<n<=200, gcd=1), 0 failures. O3: 1101 pairs
  (n<=60), 0 failures. Three independent algorithms agree. H1 CONFIRMED (exact digit
  extraction + exact round-trip, integer-only). The promoted anchor CONFIRMED:
  gauge = |det(intersection form)| = n = |cyclic group order| on the entire battery.
  Geometric interpretation CONFIRMED by the toric resolution on the sample. Examples:
  (5,4)->[2,2,2,2] (A4 chain), (7,3)->[3,2,2], (5,2)/(5,3)->[3,2]/[2,3] (dual pair
  reversed), (200,199)->[2^199] (A199). Max chain length 199.
falsifiers:
  F-exact:  SILENT (ZZ/QQ only, no float in any core path).
  F-oracle: SATISFIED (agreement measured against 2 algebraic + 1 geometric oracle,
            each algorithmically independent of the digit recursion).
  F-lawpoint: honored (singularity = radix law, not a point).
