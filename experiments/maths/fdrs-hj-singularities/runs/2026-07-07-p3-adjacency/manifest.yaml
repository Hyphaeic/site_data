run_id: 2026-07-07-p3-adjacency
experiment: experiment-fdrs-hj-singularities
gate: G2-execute (P3 — prefix ultrametric vs deformation adjacency)
date: 2026-07-07
result_tag: exact inputs; correspondence measured
pre_registration: >
  README.md "P3" (three strata: A_n HIT · Christophersen–Stevens contested · T-singularity
  MISS) + F-circular + the pre-registered expectation "PARTIAL". Authored before this code.
backend: SageMath 10.9 (ZZ/QQ, exact combinatorics) + Rust mirror.
scene: >
  H2 refined: the prefix ultrametric delta(x,y)=gauge(lcp)^{-1} on HJ chains vs DECIDABLE,
  independently-defined deformation adjacency (F-circular avoided). S1 A_n [2^k]: truncation
  adjacency. S2 T-singularities via the Wahl tree from [4]: QG-smoothing adjacency, each
  chain verified as (1/dn^2)(1,dnq-1). S3: correlate prefix-shared depth with Wahl-tree
  distance; plus the counting bound (linear prefixes vs Catalan-many CS components).
verdict: >
  PARTIAL / bounded correspondence — exactly as pre-registered.
  S1 HIT: 59/59 adjacent A_n pairs are prefix-related; prefix-order == truncation order.
  S2 MISS: 255 Wahl T-chains (len<=8), 255/255 verified as genuine T-singularities, 254
  QG-smoothing adjacencies, 0 prefix-related — the smoothing adjacency is orthogonal to the
  prefix ultrametric. S3: prefix-closeness vs deformation-distance correlate only +0.193
  (weak, and the sign means prefix-close pairs trend deformation-FAR — not a partial hit);
  and the counting bound is decisive — prefix predecessors are linear in chain length e
  while CS deformation components are Catalan-many (C_2=2, C_4=14, C_7=429), so a prefix
  order provably cannot encode them. The prefix ultrametric is a faithful shadow of the
  RESOLUTION (blow-down) order and a coarse, mostly-blind shadow of the DEFORMATION order.
falsifiers:
  F-circular: AVOIDED — adjacency (A_n classical order; Wahl/T tree) is defined independently
              of the prefix; the retired "edit-distance" target (which was the prefix tree)
              is not used.
  F-exact:  SILENT (ZZ/QQ, exact combinatorics).
  F-novel:  honored — HJ/CF/toric/Wahl/CS are classical; the artifact is the FDRS reading
            + the measured shape, not a new theorem.
findings_kept:
  - "H2 is PARTIAL (first-class negative): the prefix ultrametric captures the A_n
     resolution-truncation adjacency exactly but is orthogonal to the T-singularity
     Q-Gorenstein smoothing adjacency (0/254), and cannot encode the Catalan-many
     Christophersen–Stevens deformation components (a counting no-go)."
metrics_emitted: [s1_hits=59/59, s1_prefix_is_order=true, t_chains=255, t_verified=255/255,
                  wahl_pairs=254, wahl_prefix_related=0, s3_corr=0.193, s3_pairs=3160]
